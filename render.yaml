services:
  - type: web
    name: gsp-cems-by-shawn
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: CEMS_PLANT_CODE
        value: S1602755
      - key: CEMS_URL
        value: https://aqmc.kcg.gov.tw/pubCems/CEMSData.aspx
