<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>GSP CEMS by Shawn</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">🏭</div>
      <div>
        <h1>GSP CEMS by Shawn</h1>
        <p>岡山焚化廠 CEMS 即時監控系統</p>
      </div>
    </div>
    <button id="refreshBtn" class="ghost">↻ 更新</button>
  </header>

  <main>
    <section class="panel controls">
      <label>日期
        <input id="dateInput" type="text" value="{{ today }}" placeholder="YYYY/MM/DD" />
      </label>
      <label>趨勢項目
        <select id="metricSelect">
          <option value="all">全部項目</option>
          <option value="opacity">不透光率</option>
          <option value="so2">SO₂</option>
          <option value="nox">NOx</option>
          <option value="co">CO</option>
          <option value="hcl">HCl</option>
          <option value="nh3">NH₃</option>
          <option value="o2">O₂</option>
          <option value="flow">排放流率</option>
          <option value="temp">溫度</option>
        </select>
      </label>
      <button id="queryBtn">🔍 查詢</button>
      <div class="last-update"><i></i><span id="lastUpdate">尚未更新</span></div>
    </section>

    <section id="status" class="status">準備查詢 CEMS...</section>

    <section class="panel latest-panel">
      <div class="section-title">
        <h2>最新即時值</h2>
        <span>三爐每項最新有效資料</span>
      </div>
      <div id="latestTable" class="latest-table-wrap"></div>
      <div class="note">資料頻率：不透光率 6 分鐘一筆；SO₂／NOx／CO／HCl／NH₃ 15 分鐘一筆；排放流率與溫度 1 小時一筆。</div>
    </section>

    <section class="panel trend-panel">
      <div class="section-title">
        <h2>24小時移動平均趨勢圖</h2>
        <span id="chartSubtitle">依項目自動套用資料頻率</span>
      </div>
      <div id="charts" class="charts-grid"></div>
    </section>

    <section class="panel footer-panel">
      <div>
        <h3>說明</h3>
        <ul>
          <li>上方表格顯示三爐最新有效監測值。</li>
          <li>下方圖表以最近 24 小時資料計算移動平均。</li>
          <li>若 Render 顯示連線逾時，通常是 CEMS 網站阻擋或雲端連線不穩。</li>
        </ul>
      </div>
      <button id="csvBtn" class="ghost csv">匯出 CSV</button>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
