<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GSP CEMS by Shawn</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">🏭</div>
      <div>
        <h1>GSP CEMS</h1>
        <p>by Shawn</p>
      </div>
    </div>
    <button id="refreshBtn" class="ghost">更新</button>
  </header>

  <main>
    <section class="panel controls">
      <label>資料日期
        <input id="dateInput" type="text" value="{{ today }}" placeholder="YYYY/MM/DD" />
      </label>
      <label>排放口
        <select id="polSelect">
          <option value="P101,P201,P301">三爐全部</option>
          <option value="P101">P101 一號爐</option>
          <option value="P201">P201 二號爐</option>
          <option value="P301">P301 三號爐</option>
        </select>
      </label>
      <label>趨勢項目
        <select id="metricSelect">
          <option value="hcl">HCl</option>
          <option value="so2">SO₂</option>
          <option value="nox">NOx</option>
          <option value="co">CO</option>
          <option value="o2">O₂</option>
          <option value="opacity">不透光率</option>
          <option value="flow">排放流率</option>
          <option value="temp">溫度</option>
        </select>
      </label>
      <button id="queryBtn">查詢</button>
    </section>

    <section id="status" class="status">準備查詢 CEMS...</section>

    <section id="cards" class="cards"></section>

    <section class="panel">
      <div class="section-title">
        <h2>趨勢圖</h2>
        <span id="chartSubtitle">三爐比較</span>
      </div>
      <div id="chart" class="chart"></div>
    </section>

    <section class="panel">
      <div class="section-title">
        <h2>最新資料表</h2>
        <button id="csvBtn" class="ghost">CSV</button>
      </div>
      <div id="tableWrap" class="table-wrap"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
